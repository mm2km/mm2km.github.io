<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Human vs Model - Video QA Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: rgba(255, 255, 255, 0.78);
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --success-border: #a7f3d0;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --error-border: #fecaca;
      --orange-bg: #fff7ed;
      --orange-border: #fed7aa;
      --orange-text: #9a3412;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --blue-text: #1d4ed8;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(to bottom, #f7f7f8 0%, #f3f4f6 100%);
      color: var(--text);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 24px 28px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: 52px;
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .hero p {
      margin: 0 auto;
      max-width: 820px;
      color: #667085;
      font-size: 18px;
      line-height: 1.7;
    }

    .arena {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .arena-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .arena-title-wrap h2 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .arena-meta {
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .scoreboard {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .score-item {
      min-width: 96px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      text-align: center;
    }

    .score-label {
      font-size: 12px;
      color: var(--muted-2);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 24px;
      font-weight: 800;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 18px;
    }

    .top-nav::-webkit-scrollbar {
      height: 8px;
    }

    .top-nav::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 999px;
    }

    .nav-pill {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-pill:hover {
      background: #f9fafb;
    }

    .nav-pill.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .panel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.03);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 22px;
      align-items: start;
      margin-bottom: 22px;
    }

    .left-panel {
      padding: 18px;
    }

    .video-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      background: #edf1f5;
      border: 1px solid #dde3ea;
      margin-bottom: 16px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .taxonomy-section {
      display: grid;
      gap: 14px;
    }

    .taxonomy-block {
      background: #fbfcfd;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    .taxonomy-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .taxonomy-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .taxonomy-tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #4b5563;
      font-size: 13px;
      font-weight: 700;
    }

    .taxonomy-tag.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .right-panel {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 18px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 24px;
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111827;
      margin-bottom: 14px;
    }

    .question-form-box {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
      margin-bottom: 12px;
    }

    .question-form-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .question-form-value {
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      font-weight: 700;
    }

    .answer-input-box {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfcfd;
      margin-bottom: 12px;
    }

    .answer-input-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .answer-input-text {
      font-size: 14px;
      line-height: 1.7;
      color: #374151;
      font-weight: 600;
    }

    .answer-input {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      font-size: 16px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .answer-input:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    .mcq-options {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .mcq-options.show {
      display: grid;
    }

    .mcq-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 14px;
      padding: 12px 14px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 56px;
    }

    .mcq-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .mcq-btn.selected {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .helper {
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.92;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #ebeef2;
    }

    .feedback-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .result-box,
    .gt-box {
      min-height: 120px;
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 16px;
      display: none;
    }

    .result-box.show,
    .gt-box.show {
      display: block;
    }

    .result-box.correct {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .result-box.wrong {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-line {
      font-size: 15px;
      line-height: 1.7;
      word-break: break-word;
    }

    .gt-box {
      background: #f8fafc;
    }

    .gt-text {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
      color: #111827;
    }

    .model-panel {
      padding: 18px;
    }

    .model-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .model-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }

    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .model-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .model-answer {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .model-content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(0, 0.8fr);
      gap: 14px;
      align-items: start;
    }

    .model-subbox,
    .difficulty-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fcfcfd;
      min-height: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .subbox-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .model-body {
      color: #374151;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .difficulty-box {
      background: var(--blue-bg);
      border-color: var(--blue-border);
    }

    .difficulty-text {
      color: var(--blue-text);
      font-size: 14px;
      line-height: 1.7;
      font-weight: 600;
      white-space: normal;
    }

    .hallucination-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--orange-bg);
      border: 1px solid var(--orange-border);
      color: var(--orange-text);
    }

    .hallucination-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .hallucination-text {
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      .model-content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .hero h1 {
        font-size: 38px;
      }

      .feedback-grid {
        grid-template-columns: 1fr;
      }

      .mcq-options {
        grid-template-columns: 1fr;
      }

      .page {
        padding: 18px 12px 20px;
      }

      .arena {
        padding: 16px;
        border-radius: 24px;
      }

      .question-text {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Human vs Model</h1>
      <p>
        Test your own spatial reasoning capabilities against the same tasks
        used to evaluate state-of-the-art multimodal models.
      </p>
    </section>

    <section class="arena">
      <div class="arena-top">
        <div class="arena-title-wrap">
          <h2>Practice Arena</h2>
          <div class="arena-meta" id="arenaMeta">VIDEO QA • ROUND 1</div>
        </div>

        <div class="scoreboard">
          <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
          </div>
          <div class="score-item">
            <div class="score-label">Streak</div>
            <div class="score-value" id="streakValue">0</div>
          </div>
        </div>
      </div>

      <div class="top-nav" id="questionNav"></div>

      <div class="main-grid">
        <div class="panel-card left-panel">
          <div class="video-box">
            <video id="questionVideo" controls preload="metadata">
              <source src="" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>

          <div class="taxonomy-section">
            <div class="taxonomy-block">
              <div class="taxonomy-title">Scale</div>
              <div class="taxonomy-row" id="scaleRow"></div>
            </div>

            <div class="taxonomy-block">
              <div class="taxonomy-title">Input Form</div>
              <div class="taxonomy-row" id="inputFormRow"></div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="panel-card card">
            <div class="section-label">Question</div>
            <div class="question-text" id="questionText"></div>
          </div>

          <div class="panel-card card">
            <div class="section-label">Answer</div>

            <div class="question-form-box">
              <div class="question-form-title">Question Form</div>
              <div class="question-form-value" id="questionFormValue"></div>
            </div>

            <div class="answer-input-box">
              <div class="answer-input-title">Input Requirements</div>
              <div class="answer-input-text" id="answerRequirementText"></div>
            </div>

            <textarea
              id="userAnswer"
              class="answer-input"
              placeholder="Type your answer here..."
            ></textarea>

            <div class="mcq-options" id="mcqOptions"></div>

            <div class="helper" id="answerHelper"></div>

            <div class="btn-row">
              <button class="btn btn-primary" id="submitBtn">Submit</button>
              <button class="btn btn-secondary" id="clearBtn">Clear</button>
              <button class="btn btn-secondary" id="nextBtn">Next</button>
            </div>
          </div>

          <div class="feedback-grid">
            <div class="result-box" id="resultBox">
              <div class="section-label">Result</div>
              <div class="result-title" id="resultTitle"></div>
              <div class="result-line" id="resultUserAnswer"></div>
            </div>

            <div class="gt-box" id="gtBox">
              <div class="section-label">Ground Truth</div>
              <div class="gt-text" id="gtText"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-card model-panel">
        <div class="section-label">Model Outputs</div>
        <div class="model-stack" id="modelGrid"></div>
      </div>
    </section>
  </div>

  <script>
    const SCALE_OPTIONS = ["Tiny", "Tabletop", "Indoor", "Outdoor"];
    const INPUT_FORM_OPTIONS = ["Video", "Video+Point", "Video+Mask", "Video+BBox"];

    const questions = [
      {
        id: 1,
        roundLabel: "VIDEO QA • ROUND 1",
        title: "Question 1",
        video: "./static/videos/1.mp4",
        question: "How long is this skeleton from head to tail?",
        gt: "12.2m",
        aliases: ["12.2m", "12.2 m"],
        scale: "Indoor",
        inputForm: "Video",
        questionForm: "Regression",
        models: [
          {
            name: "Gemini-2.5 Pro",
            answer: "30 meters",
            output: `The model infers the skeleton length from supposed visual cues in the museum scene and concludes it is 30 meters long.`,
            difficulty: `This task is difficult because scale cues are weak and spread across the whole scene. The model can easily hallucinate nonexistent measurement hints or over-rely on museum priors.`,
            hallucination: `No red measuring line and no "30 m" text appear in the video.`
          },
          {
            name: "SpaceVista-7B",
            answer: "8.5 meters",
            output: `The model estimates length by comparing the skeleton with barriers, people, ceiling height, and typical dinosaur size in a museum setting.`,
            difficulty: `The challenge is coarse scale estimation in a large indoor scene. The model must use indirect context rather than any explicit ruler or numeric cue.`
          }
        ]
      },
      {
        id: 2,
        roundLabel: "VIDEO+BBox • ROUND 2",
        title: "Question 2",
        video: "./static/videos/2.mp4",
        question: "How tall is this building marked by the red box?",
        gt: "7.6m",
        aliases: ["7.6m", "7.6 m"],
        scale: "Outdoor",
        inputForm: "Video+BBox",
        questionForm: "Regression",
        models: [
          {
            name: "Gemini-2.5 Pro",
            answer: "18 meters",
            output: `The model uses the door, facade segmentation, and assumed floor heights to estimate the building height as about 18 meters.`,
            difficulty: `This task requires grounding the red box correctly and separating the target building from nearby structures. Perspective, facade curvature, and uncertain floor segmentation make the estimate unstable.`
          },
          {
            name: "SpaceVista-7B",
            answer: "15 meters",
            output: `The model estimates height from architectural cues such as the pedestrian door, circular window, and neighboring glass building.`,
            difficulty: `The hard part is cross-object scale transfer in an outdoor scene. Architectural priors can help, but they also make overestimation easy.`
          }
        ]
      },
      {
        id: 3,
        roundLabel: "VIDEO+POINT • ROUND 3",
        title: "Question 3",
        video: "./static/videos/3.mp4",
        question: "How tall is the object that the red dot referred to in the first frame, from head to feet?",
        gt: "1.6m",
        aliases: ["1.6m", "1.6 m"],
        scale: "Outdoor",
        inputForm: "Video+Point",
        questionForm: "Regression",
        models: [
          {
            name: "Gemini-2.5 Pro",
            answer: "3.6m",
            output: `The model treats the target as a heroic-scale statue and estimates its figure height at about 3.6 meters.`,
            difficulty: `The red point identifies the target only in the first frame, so the model must keep tracking it later. A major difficulty is separating statue height from pedestal height.`
          },
          {
            name: "SpaceVista-7B",
            answer: "1.75m",
            output: `The model uses surrounding stairs and monument proportions to estimate the figure itself at roughly 1.75 meters.`,
            difficulty: `This task is hard because small errors in step-height assumptions directly affect the final answer. The model must isolate the figure rather than the full monument.`
          }
        ]
      },
      {
        id: 4,
        roundLabel: "VIDEO+Mask • ROUND 4",
        title: "Question 4",
        video: "./static/videos/4.mp4",
        question: "How long is this red-marked object?",
        gt: "3cm",
        aliases: ["3cm", "3 cm"],
        scale: "Tiny",
        inputForm: "Video+Mask",
        questionForm: "Regression",
        models: [
          {
            name: "Gemini-2.5 Pro",
            answer: "3cm",
            output: `The model estimates the screw length by comparing it with the nearby bottle cap and concludes it is about 3 cm long.`,
            difficulty: `This is a tiny-scale measurement problem where the mask helps localization, but the estimate still depends on a reliable reference object. Small perspective shifts can strongly affect centimeter-level judgments.`
          },
          {
            name: "SpaceVista-7B",
            answer: "3.3cm",
            output: `The model compares the screw against the diameter of the nearby bottle cap and estimates the length at around 3.3 cm.`,
            difficulty: `The hard part is fine-grained relative sizing. At this scale, a small overestimate in cap comparison is enough to shift the final answer noticeably.`
          }
        ]
      },
      {
        id: 5,
        roundLabel: "VIDEO • ROUND 5",
        title: "Question 5",
        video: "./static/videos/5.mp4",
        question: "What is the distance between two objects?",
        gt: "3cm",
        aliases: ["3cm", "3 cm"],
        scale: "Tiny",
        inputForm: "Video",
        questionForm: "Regression",
        models: [
          {
            name: "Gemini-2.5 Pro",
            answer: "No Answer",
            output: `The model argues that the exact distance between the bottle cap and the screw cannot be measured from the video because no reliable scale reference is available.`,
            difficulty: `The task asks for absolute distance without an explicit measuring tool. Relative layout is visible, but converting that into centimeters requires risky assumptions about scale and viewpoint.`
          },
          {
            name: "SpaceVista-7B",
            answer: "3cm",
            output: `The model uses the bottle cap as an approximate scale reference and estimates the inter-object gap at around 3 cm.`,
            difficulty: `Even though both objects are clear, tiny-scale distance estimation is sensitive to camera angle and object orientation. The model must infer distance indirectly from size transfer.`
          }
        ]
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let selectedMCQ = "";
    const answeredMap = new Map();

    const arenaMeta = document.getElementById("arenaMeta");
    const questionVideo = document.getElementById("questionVideo");
    const questionText = document.getElementById("questionText");
    const userAnswer = document.getElementById("userAnswer");
    const submitBtn = document.getElementById("submitBtn");
    const clearBtn = document.getElementById("clearBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultUserAnswer = document.getElementById("resultUserAnswer");
    const gtBox = document.getElementById("gtBox");
    const gtText = document.getElementById("gtText");
    const scoreValue = document.getElementById("scoreValue");
    const streakValue = document.getElementById("streakValue");
    const questionNav = document.getElementById("questionNav");
    const modelGrid = document.getElementById("modelGrid");
    const scaleRow = document.getElementById("scaleRow");
    const inputFormRow = document.getElementById("inputFormRow");
    const questionFormValue = document.getElementById("questionFormValue");
    const answerRequirementText = document.getElementById("answerRequirementText");
    const mcqOptions = document.getElementById("mcqOptions");
    const answerHelper = document.getElementById("answerHelper");

    function cleanDisplayText(str) {
      return String(str || "")
        .replace(/<semantic>/g, "")
        .replace(/<\/semantic>/g, "")
        .replace(/<scale>/g, "")
        .replace(/<\/scale>/g, "")
        .replace(/<answer>/g, "")
        .replace(/<\/answer>/g, "")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-")
        .replace(/\u00A0/g, " ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function escapeHTML(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeAnswer(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function isAnswerCorrect(input, item) {
      const normInput = normalizeAnswer(input);
      const accepted = [item.gt, ...(item.aliases || [])].map(normalizeAnswer);
      return accepted.includes(normInput);
    }

    function updateScoreboard() {
      scoreValue.textContent = score;
      streakValue.textContent = streak;
    }

    function renderQuestionNav() {
      questionNav.innerHTML = "";

      questions.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.className = "nav-pill" + (index === currentIndex ? " active" : "");
        btn.type = "button";
        btn.textContent = item.title;
        btn.addEventListener("click", () => {
          currentIndex = index;
          loadQuestion(currentIndex);
        });
        questionNav.appendChild(btn);
      });
    }

    function renderTaxonomy(container, options, activeValue) {
      container.innerHTML = "";
      options.forEach((value) => {
        const tag = document.createElement("span");
        tag.className = "taxonomy-tag" + (value === activeValue ? " active" : "");
        tag.textContent = value;
        container.appendChild(tag);
      });
    }

    function renderModels(item) {
      modelGrid.innerHTML = "";

      (item.models || []).forEach((model) => {
        const card = document.createElement("div");
        card.className = "model-card";

        const safeName = escapeHTML(cleanDisplayText(model.name || ""));
        const safeAnswer = escapeHTML(cleanDisplayText(model.answer || "-"));
        const safeOutput = escapeHTML(cleanDisplayText(model.output || ""));
        const safeDifficulty = escapeHTML(cleanDisplayText(model.difficulty || ""));
        const safeHallucination = escapeHTML(cleanDisplayText(model.hallucination || ""));

        const hallucinationHTML = model.hallucination
          ? `
            <div class="hallucination-box">
              <div class="hallucination-label">Hallucination</div>
              <div class="hallucination-text">${safeHallucination}</div>
            </div>
          `
          : "";

        card.innerHTML = `
          <div class="model-header">
            <div class="model-name">${safeName}</div>
            <div class="model-answer">Answer: ${safeAnswer}</div>
          </div>

          <div class="model-content-grid">
            <div class="model-subbox">
              <div class="subbox-title">Model Output</div>
              <div class="model-body">${safeOutput}</div>
            </div>

            <div class="difficulty-box">
              <div class="subbox-title">Difficulty Analysis</div>
              <div class="difficulty-text">${safeDifficulty || "No difficulty analysis provided."}</div>
            </div>
          </div>

          ${hallucinationHTML}
        `;

        modelGrid.appendChild(card);
      });
    }

    function renderAnswerMode(item) {
      selectedMCQ = "";
      userAnswer.value = "";
      questionFormValue.textContent = item.questionForm;

      if (item.questionForm === "Multiple Choice") {
        userAnswer.style.display = "none";
        mcqOptions.classList.add("show");
        mcqOptions.innerHTML = "";

        (item.options || []).forEach((opt) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "mcq-btn";
          btn.innerHTML = `<strong>${escapeHTML(opt.key)}.</strong> ${escapeHTML(opt.text)}`;

          btn.addEventListener("click", () => {
            selectedMCQ = opt.key;
            Array.from(mcqOptions.querySelectorAll(".mcq-btn")).forEach((el) => {
              el.classList.remove("selected");
            });
            btn.classList.add("selected");
          });

          mcqOptions.appendChild(btn);
        });

        answerRequirementText.innerHTML = `
          Enter a single option label.<br>
          <strong>Required format:</strong> A, B, C, or D.<br>
          <strong>Examples:</strong> A / B / C / D
        `;
        answerHelper.textContent = "Choose exactly one option. The selected option label will be submitted.";
      } else {
        userAnswer.style.display = "block";
        mcqOptions.classList.remove("show");
        mcqOptions.innerHTML = "";

        answerRequirementText.innerHTML = `
          Enter a regression-style answer using a number or a number with unit.<br>
          <strong>Required format:</strong> numeric value or numeric value + unit.<br>
          <strong>Examples:</strong> 12.2m / 12.2 m / 3.5 / 2 meters
        `;
        answerHelper.textContent = "Input is matched case-insensitively after trimming whitespace.";
      }
    }

    function resetFeedback() {
      resultBox.className = "result-box";
      resultTitle.textContent = "";
      resultUserAnswer.textContent = "";
      gtBox.classList.remove("show");
      gtText.textContent = "";
    }

    function loadQuestion(index) {
      const item = questions[index];
      arenaMeta.textContent = item.roundLabel;
      questionText.textContent = item.question;
      questionVideo.src = item.video;
      questionVideo.load();

      renderTaxonomy(scaleRow, SCALE_OPTIONS, item.scale);
      renderTaxonomy(inputFormRow, INPUT_FORM_OPTIONS, item.inputForm);

      renderAnswerMode(item);
      resetFeedback();
      renderModels(item);
      renderQuestionNav();
    }

    function showResult(correct, userText, item) {
      resultBox.classList.add("show");
      resultBox.classList.remove("correct", "wrong");
      resultBox.classList.add(correct ? "correct" : "wrong");

      resultTitle.textContent = correct ? "Correct" : "Incorrect";
      resultUserAnswer.textContent = "Your answer: " + (userText.trim() || "(empty)");

      gtBox.classList.add("show");
      gtText.textContent = item.gt;
    }

    function getCurrentUserAnswer(item) {
      if (item.questionForm === "Multiple Choice") {
        return selectedMCQ || "";
      }
      return userAnswer.value;
    }

    function submitAnswer() {
      const item = questions[currentIndex];
      const input = getCurrentUserAnswer(item);
      const correct = isAnswerCorrect(input, item);

      showResult(correct, input, item);

      const alreadyAnswered = answeredMap.has(item.id);

      if (!alreadyAnswered) {
        if (correct) {
          score += 1;
          streak += 1;
        } else {
          streak = 0;
        }

        answeredMap.set(item.id, {
          correct,
          userAnswer: input
        });

        updateScoreboard();
      }
    }

    function goNext() {
      currentIndex = (currentIndex + 1) % questions.length;
      loadQuestion(currentIndex);
    }

    function clearAnswer() {
      const item = questions[currentIndex];

      if (item.questionForm === "Multiple Choice") {
        selectedMCQ = "";
        Array.from(mcqOptions.querySelectorAll(".mcq-btn")).forEach((el) => {
          el.classList.remove("selected");
        });
      } else {
        userAnswer.value = "";
        userAnswer.focus();
      }
    }

    submitBtn.addEventListener("click", submitAnswer);
    clearBtn.addEventListener("click", clearAnswer);
    nextBtn.addEventListener("click", goNext);

    userAnswer.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        submitAnswer();
      }
    });

    updateScoreboard();
    renderQuestionNav();
    loadQuestion(currentIndex);
  </script>
</body>
</html>
