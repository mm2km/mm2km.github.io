<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Human vs Model - Video QA Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: rgba(255, 255, 255, 0.76);
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --soft: #f8fafc;
      --primary: #111827;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --success-border: #a7f3d0;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --error-border: #fecaca;
      --orange-bg: #fff7ed;
      --orange-border: #fed7aa;
      --orange-text: #9a3412;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(to bottom, #f7f7f8 0%, #f3f4f6 100%);
      color: var(--text);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 34px 24px 28px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: 52px;
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .hero p {
      margin: 0 auto;
      max-width: 820px;
      color: #667085;
      font-size: 18px;
      line-height: 1.7;
    }

    .arena {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .arena-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .arena-title-wrap h2 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .arena-meta {
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .scoreboard {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .score-item {
      min-width: 96px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      text-align: center;
    }

    .score-label {
      font-size: 12px;
      color: var(--muted-2);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 24px;
      font-weight: 800;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 18px;
    }

    .top-nav::-webkit-scrollbar {
      height: 8px;
    }

    .top-nav::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 999px;
    }

    .nav-pill {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-pill:hover {
      background: #f9fafb;
    }

    .nav-pill.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .panel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.03);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 22px;
      align-items: start;
      margin-bottom: 22px;
    }

    .left-panel {
      padding: 18px;
    }

    .video-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      background: #edf1f5;
      border: 1px solid #dde3ea;
      margin-bottom: 16px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .taxonomy-section {
      display: grid;
      gap: 14px;
    }

    .taxonomy-block {
      background: #fbfcfd;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    .taxonomy-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .taxonomy-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .taxonomy-tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #4b5563;
      font-size: 13px;
      font-weight: 700;
    }

    .taxonomy-tag.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .right-panel {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 18px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 24px;
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .answer-type-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
    }

    .answer-type-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .answer-type-text {
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      font-weight: 600;
    }

    .answer-input {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      font-size: 16px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .answer-input:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    .mcq-options {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .mcq-options.show {
      display: grid;
    }

    .mcq-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 14px;
      padding: 12px 14px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 56px;
    }

    .mcq-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .mcq-btn.selected {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .helper {
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.92;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #ebeef2;
    }

    .feedback-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .result-box,
    .gt-box {
      min-height: 120px;
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 16px;
      display: none;
    }

    .result-box.show,
    .gt-box.show {
      display: block;
    }

    .result-box.correct {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .result-box.wrong {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-line {
      font-size: 15px;
      line-height: 1.7;
      word-break: break-word;
    }

    .gt-box {
      background: #f8fafc;
    }

    .gt-text {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
      color: #111827;
    }

    .model-panel {
      padding: 18px;
    }

    .model-stack {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .model-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
    }

    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .model-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .model-answer {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .model-body {
      color: #374151;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .hallucination-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--orange-bg);
      border: 1px solid var(--orange-border);
      color: var(--orange-text);
    }

    .hallucination-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .hallucination-text {
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .model-stack {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .hero h1 {
        font-size: 38px;
      }

      .feedback-grid {
        grid-template-columns: 1fr;
      }

      .mcq-options {
        grid-template-columns: 1fr;
      }

      .page {
        padding: 18px 12px 20px;
      }

      .arena {
        padding: 16px;
        border-radius: 24px;
      }

      .question-text {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Human vs Model</h1>
      <p>
        Test your own spatial reasoning capabilities against the same tasks
        used to evaluate state-of-the-art multimodal models.
      </p>
    </section>

    <section class="arena">
      <div class="arena-top">
        <div class="arena-title-wrap">
          <h2>Practice Arena</h2>
          <div class="arena-meta" id="arenaMeta">VIDEO QA • ROUND 1</div>
        </div>

        <div class="scoreboard">
          <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
          </div>
          <div class="score-item">
            <div class="score-label">Streak</div>
            <div class="score-value" id="streakValue">0</div>
          </div>
        </div>
      </div>

      <div class="top-nav" id="questionNav"></div>

      <div class="main-grid">
        <div class="panel-card left-panel">
          <div class="video-box">
            <video id="questionVideo" controls preload="metadata">
              <source src="" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>

          <div class="taxonomy-section">
            <div class="taxonomy-block">
              <div class="taxonomy-title">Scale</div>
              <div class="taxonomy-row" id="scaleRow"></div>
            </div>

            <div class="taxonomy-block">
              <div class="taxonomy-title">Input Form</div>
              <div class="taxonomy-row" id="inputFormRow"></div>
            </div>

            <div class="taxonomy-block">
              <div class="taxonomy-title">Question Form</div>
              <div class="taxonomy-row" id="questionFormRow"></div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="panel-card card">
            <div class="section-label">Question</div>
            <div class="question-text" id="questionText"></div>

            <div class="answer-type-box">
              <div class="answer-type-title">Answer Type</div>
              <div class="answer-type-text" id="answerType
